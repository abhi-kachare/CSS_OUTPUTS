<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Arguments Example - Plain HTML/JS</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 30px;
        }
        button {
            font-size: 1rem;
            padding: 8px 16px;
            cursor: pointer;
            background-color: #0077cc;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>
    <div style="padding: 30px;">
        <h2>Multiple Arguments Example</h2>
        <button id="myButton">Click Me</button>
    </div>

    <script>
        // Function that accepts multiple arguments and shows alert
        function showDetails(name, roll) {
            alert("Name: " + name + "\nRoll No: " + roll);
        }

        // Get the button element
        const button = document.getElementById("myButton");

        // Attach click event handler that calls showDetails with two arguments
        button.addEventListener("click", function() {
            showDetails("Anand", 101);
        });
    </script>
</body>
</html>
