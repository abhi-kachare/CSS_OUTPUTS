cat > index.html << 'EOF'
<!DOCTYPE html>
<html ng-app="morningApp">
<head>
  <title>Good Morning App</title>
  <script src="node_modules/angular/angular.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #fff;
    }
    .left-panel {
      flex: 1;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 2px solid #f0f0f0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .logo span {
      font-size: 22px;
      font-weight: bold;
      color: #dd0031;
    }
    .left-panel h1 {
      font-size: 52px;
      font-weight: 900;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    .left-panel p { font-size: 18px; color: #555; }
    .right-panel {
      width: 320px;
      padding: 60px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .right-panel a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: #dd0031;
      font-size: 15px;
      font-weight: 500;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .right-panel a::after { content: '↗'; font-size: 13px; }
    .social-icons { display: flex; gap: 16px; margin-top: 20px; }
    .social-icons a { border: none; padding: 0; font-size: 22px; color: #444; }
    .social-icons a::after { content: ''; }
  </style>
</head>
<body ng-controller="MorningController">

  <div class="left-panel">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
        <polygon fill="#dd0031" points="125,30 125,30 125,30 31.9,63.2 46.1,186.3 125,230 203.9,186.3 218.1,63.2"/>
        <polygon fill="#c3002f" points="125,30 125,52.2 125,153.4 125,230 203.9,186.3 218.1,63.2"/>
        <path fill="#fff" d="M125,52.1L66.8,182.6h21.7l11.7-29.2h49.4l11.7,29.2h21.7L125,52.1z M142,135.4H108l17-40.9L142,135.4z"/>
      </svg>
      <span>Angular</span>
    </div>
    <h1>{{ GOOD MORNING}}</h1>
    <p>{{  }} 🎉</p>
  </div>

  <div class="right-panel">
    <a href="#">Explore the Docs</a>
    <a href="#">Learn with Tutorials</a>
    <a href="#">Prompt and best practices for AI</a>
    <a href="#">CLI Docs</a>
    <a href="#">Angular Language Service</a>
    <a href="#">Angular DevTools</a>
    <div class="social-icons">
      <a href="#">⬡</a>
      <a href="#">𝕏</a>
      <a href="#">▶</a>
    </div>
  </div>

  <script>
    var app = angular.module('morningApp', []);
    app.controller('MorningController', function($scope) {
      $scope.message    = "GOOD MORNING,";
      $scope.subMessage = "Congratulations! Your app is running.";
    });
  </script>

</body>
</html>
EOF
