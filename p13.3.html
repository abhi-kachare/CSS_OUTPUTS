<!DOCTYPE html>
<html ng-app="textApp">
<head>
  <title>Uppercase Lowercase with Buttons</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="TextController">

  <h2>Text Conversion Using Buttons</h2>

  Enter Text:
  <input type="text" ng-model="text">

  <br><br>

  <button ng-click="toUpper()">Convert to Uppercase</button>
  <button ng-click="toLower()">Convert to Lowercase</button>

  <h3>Result: {{result}}</h3>

<script>
  var app = angular.module("textApp", []);
  app.controller("TextController", function($scope, $filter) {

    $scope.text   = "";
    $scope.result = "";

    $scope.toUpper = function() {
      $scope.result = $filter('uppercase')($scope.text);
    };

    $scope.toLower = function() {
      $scope.result = $filter('lowercase')($scope.text);
    };

  });
</script>

</body>
</html>
